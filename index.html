<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>I love lamp</title>
    <link rel="stylesheet" href="/src/style.css" />

    <!--
      Load-time optimizations.
      preconnect: warm TLS to YouTube hosts before iframe mounts.
      preload: fetch the still thumbnail at high priority so the page has
      visible content during the curtain (instead of black) and the
      transition into the live video is seamless.
      NOTE: when you change the video ID, update it in THREE places:
        1. the iframe src below (twice — embed/ID and playlist=ID)
        2. the preload href below
        3. the .lamp-curtain background-image in style.css
    -->
    <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin />
    <link rel="preconnect" href="https://www.youtube.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="dns-prefetch" href="https://yt3.ggpht.com" />
    <link rel="preload" as="image" href="https://i.ytimg.com/vi/S1a2wUfAdFM/maxresdefault.jpg" />
  </head>
  <body>
    <!--
      Split-tone color filter. Per-channel lookup tables map grayscale
      luminance to a lavender (shadows) → orange (highlights) gradient.
      Tune the tableValues to reshape the color curve. Only color transforms
      here — no blur — so it stays GPU-stable.
    -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
      <filter id="splittone" color-interpolation-filters="sRGB">
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
          <feFuncR type="table" tableValues="0.10 0.40 0.74 0.96 1.00"/>
          <feFuncG type="table" tableValues="0.05 0.22 0.45 0.60 0.72"/>
          <feFuncB type="table" tableValues="0.28 0.45 0.30 0.14 0.04"/>
        </feComponentTransfer>
      </filter>
    </svg>
    <div class="lamp-stage">
      <iframe
        class="lamp-video"
        src="https://www.youtube-nocookie.com/embed/S1a2wUfAdFM?autoplay=1&mute=1&controls=0&loop=1&playlist=S1a2wUfAdFM&modestbranding=1&playsinline=1&rel=0&iv_load_policy=3&disablekb=1&vq=hd1080&hd=1"
        title="Lava lamp"
        frameborder="0"
        allow="autoplay; encrypted-media; picture-in-picture"
        loading="eager"
      ></iframe>
      <!-- Shield blocks pointer events so visitors can't pause/open the YouTube UI. -->
      <div class="lamp-shield"></div>
      <!-- Curtain hides the YT/OS media-session overlay during the first few seconds of autoplay. -->
      <div class="lamp-curtain"></div>
    </div>

    <div class="tungsten-glow"></div>

  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>bongpot.com — I love lamp</title>
    <meta name="description" content="A psychedelic lava lamp for your screen. Press play and chill." />

    <!--
      Favicons — single graded frame at t=2700 (a clean centered blob)
      cropped tight to make the wax shape recognizable at 32px.
    -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />

    <link rel="stylesheet" href="/src/style.css" />

    <!--
      Link-share preview cards (iMessage, Discord, Slack, WhatsApp, Twitter,
      Facebook, etc.). og:image points at an animated GIF so the lamp moves
      in the preview. og:video gives clients that prefer it a tiny MP4.
    -->
    <meta property="og:title" content="bongpot.com — I love lamp" />
    <meta property="og:description" content="A psychedelic lava lamp for your screen. Press play and chill." />
    <meta property="og:url" content="https://bongpot.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://bongpot.com/preview.gif" />
    <meta property="og:image:type" content="image/gif" />
    <meta property="og:image:width" content="600" />
    <meta property="og:image:height" content="338" />
    <meta property="og:image:alt" content="A lavender and orange lava lamp slowly drifting" />
    <meta property="og:video" content="https://bongpot.com/preview.mp4" />
    <meta property="og:video:secure_url" content="https://bongpot.com/preview.mp4" />
    <meta property="og:video:type" content="video/mp4" />
    <meta property="og:video:width" content="600" />
    <meta property="og:video:height" content="338" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="bongpot.com — I love lamp" />
    <meta name="twitter:description" content="A psychedelic lava lamp for your screen. Press play and chill." />
    <meta name="twitter:image" content="https://bongpot.com/preview.gif" />
    <meta name="twitter:image:alt" content="A lavender and orange lava lamp slowly drifting" />

    <!--
      Load-time optimization. Warms TLS to YouTube hosts before the iframe
      mounts so the player + first video chunks arrive faster.
      NOTE: when you change the video ID, update it in TWO places below:
        1. the iframe src (twice — embed/ID and playlist=ID)
    -->
    <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin />
    <link rel="preconnect" href="https://www.youtube.com" crossorigin />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://yt3.ggpht.com" />
  </head>
  <body>
    <!--
      Split-tone color filter. Per-channel lookup tables map grayscale
      luminance to a lavender (shadows) → orange (highlights) gradient.
      Tune the tableValues to reshape the color curve. Only color transforms
      here — no blur — so it stays GPU-stable.
    -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
      <filter id="splittone" color-interpolation-filters="sRGB">
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
          <feFuncR type="table" tableValues="0.10 0.40 0.74 0.96 1.00"/>
          <feFuncG type="table" tableValues="0.05 0.22 0.45 0.60 0.72"/>
          <feFuncB type="table" tableValues="0.28 0.45 0.30 0.14 0.04"/>
        </feComponentTransfer>
      </filter>
    </svg>
    <div class="lamp-stage">
      <iframe
        id="lamp-video"
        class="lamp-video"
        src="https://www.youtube-nocookie.com/embed/lPInO0xV8x4?autoplay=1&mute=1&controls=0&loop=1&playlist=lPInO0xV8x4&modestbranding=1&playsinline=1&rel=0&iv_load_policy=3&disablekb=1&vq=hd1080&hd=1&enablejsapi=1"
        title="Lava lamp"
        frameborder="0"
        allow="autoplay; encrypted-media"
        loading="eager"
      ></iframe>

      <!--
        Mobile fallback. The YouTube iframe path on iOS Safari has a stack
        of fragile issues (autoplay block, OS media-session overlay flash,
        cross-origin filter producing a yellow screen). For a touch device
        we skip the iframe entirely and play the same color-graded
        boomerang clip we use for the link-share preview, as a native
        <video>. Reliable autoplay, baked-in lavender/orange grade, no
        YouTube chrome to hide, no third-party iframe quirks.
      -->
      <video
        id="lamp-fallback"
        class="lamp-fallback"
        src="/preview.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true"
      ></video>
      <!-- Shield blocks pointer events so visitors can't pause/open the YouTube UI. -->
      <div class="lamp-shield"></div>
      <!--
        Curtain hides the YT/OS media-session overlay during the first
        seconds of autoplay. Default quote shown if JS is disabled; the
        script below replaces it with a random pick on page load.
      -->
      <div class="lamp-curtain">
        <div class="lamp-greeting">
          <p class="lamp-greeting-primary">&ldquo;What matters most is how well you walk through the fire.&rdquo;</p>
          <p class="lamp-greeting-secondary">— Charles Bukowski</p>
        </div>
      </div>
    </div>

    <div class="tungsten-glow"></div>

    <!--
      Lift the curtain exactly when YouTube reports the video is playing
      instead of waiting on a fixed timer. Two safety nets layered:
        1. JS setTimeout(8000) — fires if the IFrame API itself fails to load
        2. CSS animation in style.css — fires if JS is disabled entirely
      Either fallback hands you a working page; the API path just makes the
      reveal snappier on most loads.
    -->
    <script>
      (() => {
        // Curated quote pool. Edit/add freely — items are [quote, author].
        // Aim for thought-provoking and weighty, not motivational filler.
        const QUOTES = [
          ["What matters most is how well you walk through the fire.", "Charles Bukowski"],
          ["Find what you love and let it kill you.", "Charles Bukowski"],
          ["There's nothing to mourn about death any more than there is to mourn about the growing of a flower.", "Charles Bukowski"],
          ["We are here to laugh at the odds and live our lives so well that Death will tremble to take us.", "Charles Bukowski"],
          ["Civilization is like a thin layer of ice upon a deep ocean of chaos and darkness.", "Werner Herzog"],
          ["The poet must not avert his eyes.", "Werner Herzog"],
          ["The common denominator of the universe is not harmony, but chaos, hostility and murder.", "Werner Herzog"],
          ["I see it as a duty: I have to articulate the inarticulate.", "Werner Herzog"],
          ["Between the wish and the thing the world lies waiting.", "Cormac McCarthy"],
          ["You forget what you want to remember, and you remember what you want to forget.", "Cormac McCarthy"],
          ["Anything that doesn't take years of your life and drive you to suicide hardly seems worth doing.", "Cormac McCarthy"],
          ["Until you make the unconscious conscious, it will direct your life and you will call it fate.", "Carl Jung"],
          ["Knowing your own darkness is the best method for dealing with the darknesses of other people.", "Carl Jung"],
          ["The privilege of a lifetime is to become who you truly are.", "Carl Jung"],
          ["The cave you fear to enter holds the treasure you seek.", "Joseph Campbell"],
          ["We must let go of the life we have planned, so as to accept the one that is waiting for us.", "Joseph Campbell"],
          ["You are an aperture through which the universe is looking at and exploring itself.", "Alan Watts"],
          ["Muddy water is best cleared by leaving it alone.", "Alan Watts"],
          ["Trying to define yourself is like trying to bite your own teeth.", "Alan Watts"],
          ["He who has a why to live for can bear almost any how.", "Friedrich Nietzsche"],
          ["When you stare into the abyss, the abyss stares back into you.", "Friedrich Nietzsche"],
          ["And those who were seen dancing were thought to be insane by those who could not hear the music.", "Friedrich Nietzsche"],
          ["In the depth of winter, I finally learned that there was in me an invincible summer.", "Albert Camus"],
          ["Buy the ticket, take the ride.", "Hunter S. Thompson"],
          ["Be patient toward all that is unsolved in your heart and try to love the questions themselves.", "Rainer Maria Rilke"],
          ["Don't bend; don't water it down; don't try to make it logical; don't edit your own soul according to the fashion.", "Franz Kafka"],
          ["Death steals everything except our stories.", "Jim Harrison"],
        ];
        const [quoteText, author] = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        const primary = document.querySelector('.lamp-greeting-primary');
        const secondary = document.querySelector('.lamp-greeting-secondary');
        if (primary) primary.textContent = '“' + quoteText + '”';
        if (secondary) secondary.textContent = '— ' + author;

        // YT IFrame API: lift on PLAYING, force play for Safari.
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        let lifted = false;
        const lift = () => {
          if (lifted) return;
          lifted = true;
          const c = document.querySelector('.lamp-curtain');
          if (c) c.classList.add('lift');
        };

        window.onYouTubeIframeAPIReady = () => {
          new YT.Player('lamp-video', {
            events: {
              onReady: (e) => {
                // Safari often blocks the autoplay= URL hint but allows
                // programmatic play after explicit mute. Try it.
                try { e.target.mute(); e.target.playVideo(); } catch (_) {}
                if (e.target.getPlayerState() === YT.PlayerState.PLAYING) lift();
              },
              onStateChange: (e) => {
                if (e.data === YT.PlayerState.PLAYING) lift();
              },
            },
          });
        };

        // On touch devices the fallback <video> plays instead of the iframe.
        // Lift the curtain when the fallback signals it's playing.
        const fallback = document.getElementById('lamp-fallback');
        if (fallback) {
          fallback.addEventListener('playing', lift, { once: true });
          fallback.addEventListener('canplay', lift, { once: true });
        }

        // Safety net: if neither path fires (broken JS, network blocking,
        // Safari refusing autoplay), still trigger the lift.
        setTimeout(lift, 4000);
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="description" content="A psychedelic lava lamp for your screen. Press play and chill." />

    <link rel="stylesheet" href="/src/style.css" />

    <meta property="og:title" content="bongpot.com — I love lamp" />
    <meta property="og:description" content="A psychedelic lava lamp for your screen. Press play and chill." />

    <meta name="twitter:title" content="bongpot.com — I love lamp" />

    <meta name="twitter:image" content="https://bongpot.com/preview.gif" />
    <meta name="twitter:image:alt" content="A lavender and orange lava lamp slowly drifting" />
  </head>
  <body>
    <div class="lamp-stage">
      <video
        id="lamp-bg"
        class="lamp-bg"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true"
        disablepictureinpicture
        disableremoteplayback
        x-webkit-airplay="deny"
      ></video>

      <div class="lamp-curtain">
        <div class="lamp-greeting">
          <p class="lamp-greeting-primary">&ldquo;What matters most is how well you walk through the fire.&rdquo;</p>
          <p class="lamp-greeting-secondary">— Charles Bukowski</p>
        </div>
      </div>
    </div>

    <div class="tungsten-glow"></div>

    <script>
      (() => {
        const QUOTES = [
          ["What matters most is how well you walk through the fire.", "Charles Bukowski"],
          ["Find what you love and let it kill you.", "Charles Bukowski"],
          ["There's nothing to mourn about death any more than there is to mourn about the growing of a flower.", "Charles Bukowski"],
          ["We are here to laugh at the odds and live our lives so well that Death will tremble to take us.", "Charles Bukowski"],
          ["Civilization is like a thin layer of ice upon a deep ocean of chaos and darkness.", "Werner Herzog"],
          ["The poet must not avert his eyes.", "Werner Herzog"],
          ["The common denominator of the universe is not harmony, but chaos, hostility and murder.", "Werner Herzog"],
          ["I see it as a duty: I have to articulate the inarticulate.", "Werner Herzog"],
          ["Between the wish and the thing the world lies waiting.", "Cormac McCarthy"],
          ["You forget what you want to remember, and you remember what you want to forget.", "Cormac McCarthy"],
          ["Anything that doesn't take years of your life and drive you to suicide hardly seems worth doing.", "Cormac McCarthy"],
          ["Until you make the unconscious conscious, it will direct your life and you will call it fate.", "Carl Jung"],
          ["Knowing your own darkness is the best method for dealing with the darknesses of other people.", "Carl Jung"],
          ["The privilege of a lifetime is to become who you truly are.", "Carl Jung"],
          ["The cave you fear to enter holds the treasure you seek.", "Joseph Campbell"],
          ["We must let go of the life we have planned, so as to accept the one that is waiting for us.", "Joseph Campbell"],
          ["You are an aperture through which the universe is looking at and exploring itself.", "Alan Watts"],
          ["Muddy water is best cleared by leaving it alone.", "Alan Watts"],
          ["Trying to define yourself is like trying to bite your own teeth.", "Alan Watts"],
          ["He who has a why to live for can bear almost any how.", "Friedrich Nietzsche"],
          ["When you stare into the abyss, the abyss stares back into you.", "Friedrich Nietzsche"],
          ["And those who were seen dancing were thought to be insane by those who could not hear the music.", "Friedrich Nietzsche"],
          ["In the depth of winter, I finally learned that there was in me an invincible summer.", "Albert Camus"],
          ["Buy the ticket, take the ride.", "Hunter S. Thompson"],
          ["Be patient toward all that is unsolved in your heart and try to love the questions themselves.", "Rainer Maria Rilke"],
          ["Don't bend; don't water it down; don't try to make it logical; don't edit your own soul according to the fashion.", "Franz Kafka"],
          ["Death steals everything except our stories.", "Jim Harrison"],
        ];
        const [quoteText, author] = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        const primary = document.querySelector('.lamp-greeting-primary');
        const secondary = document.querySelector('.lamp-greeting-secondary');
        if (primary) primary.textContent = '“' + quoteText + '”';
        if (secondary) secondary.textContent = '— ' + author;

        // Pick the right video file for the device. Mobile gets a much
        // lighter cellular-friendly version; desktop gets the full 10-min
        // boomerang with the lavender/orange grade baked in.
        const video = document.getElementById('lamp-bg');
        const isMobile = matchMedia('(hover: none) and (pointer: coarse)').matches;
        video.src = isMobile ? '/lamp-mobile.mp4' : '/lamp-bg.mp4';

        // Lift the curtain when the video signals it's playing.
        const lift = () => {
          const c = document.querySelector('.lamp-curtain');
          if (c) c.classList.add('lift');
        };
        video.addEventListener('playing', lift, { once: true });
        video.addEventListener('canplay', lift, { once: true });
        // Safety net for completely-broken-JS / network blocks.
        setTimeout(lift, 4000);

        // Watchdog: any time the video pauses, stalls, or the tab refocuses,
        // try to play it again. Also try on the first user interaction so
        // browsers that hard-blocked autoplay (Safari Low Power, per-site
        // "Never Auto-Play") still hand us a play() the moment the user
        // touches the page.
        const tryPlay = () => video.play().catch(() => {});
        tryPlay();
        ['click', 'touchstart', 'scroll', 'keydown', 'pointerdown'].forEach((evt) => {
          document.addEventListener(evt, tryPlay, { passive: true });
        });
        video.addEventListener('pause', tryPlay);
        video.addEventListener('stalled', tryPlay);
        video.addEventListener('waiting', tryPlay);
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) tryPlay();
        });
      })();
    </script>
  </body>
</html>

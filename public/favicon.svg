<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="blob" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#fff5d8"/>
      <stop offset="12%" stop-color="#ffcc70"/>
      <stop offset="38%" stop-color="#ff6e1a"/>
      <stop offset="72%" stop-color="#a82500"/>
      <stop offset="100%" stop-color="#3a0c00"/>
    </radialGradient>
  </defs>
  <!--
    Settled-blob silhouette: wide and squat, sitting in the lower portion
    of the canvas with a smooth dome top. Empty space at the top of the
    icon reads as "the blob has landed at the base of the lamp" — clearly
    not a sphere even at 16px.
  -->
  <path d="M 50 28
           C 30 28, 12 38, 8 56
           C 4 76, 18 90, 50 90
           C 80 90, 96 74, 92 56
           C 88 36, 70 26, 50 28 Z"
        fill="url(#blob)"/>
</svg>
